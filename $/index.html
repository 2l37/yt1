<head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

:root{
    --bg:#070708;
    --card:rgba(255,255,255,.03);
    --border:rgba(255,255,255,.06);
    --blue:#1e40af;
    --blue-light:#60a5fa;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    min-height:100%;
}

body{
    background:var(--bg);
    color:white;
    font-family:'Figtree',sans-serif;
    overflow-x:hidden;
}

/* GRAIN */

.grain{
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:.03;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

/* GLOW */

.glow{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
}

.glow::before{
    content:"";
    position:absolute;
    width:900px;
    height:700px;
    left:50%;
    top:-250px;
    transform:translateX(-50%);
    background:
    radial-gradient(circle,
    rgba(30,64,175,.55),
    transparent 70%);
    filter:blur(140px);
}

.glow::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    left:35%;
    top:30%;
    background:
    radial-gradient(circle,
    rgba(96,165,250,.15),
    transparent 70%);
    filter:blur(120px);
}

main{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

.profile{
    width:100%;
    max-width:460px;
    display:flex;
    flex-direction:column;
    align-items:center;
    animation:fadeUp .8s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* AVATAR */

.avatar{
    width:120px;
    height:120px;
    border-radius:999px;
    object-fit:cover;
    border:1px solid var(--border);
    margin-bottom:18px;
}

/* USERNAME */

.username{
    font-family:'Radio Canada Big',sans-serif;
    font-size:46px;
    line-height:1;
    letter-spacing:-2px;
}

.bio{
    margin-top:10px;
    color:rgba(255,255,255,.45);
    font-size:14px;
}

.location{
    margin-top:12px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:rgba(255,255,255,.35);
}

/* CARD */

.card{
    width:100%;
    margin-top:26px;

    background:var(--card);
    backdrop-filter:blur(20px);

    border:1px solid var(--border);

    border-radius:22px;
    padding:16px;
}

.discord-card{
    display:flex;
    align-items:center;
    gap:14px;
}

.discord-avatar{
    width:64px;
    height:64px;
    border-radius:16px;
    object-fit:cover;
}

.discord-info{
    flex:1;
}

.discord-name{
    font-size:16px;
    font-weight:600;
}

.discord-status{
    font-size:13px;
    color:rgba(255,255,255,.55);
    margin-top:2px;
}

.discord-activity{
    font-size:12px;
    margin-top:6px;
    color:var(--blue-light);
}

.status-dot{
    width:12px;
    height:12px;
    border-radius:999px;
    background:#22c55e;
}

/* SOCIALS */

.socials{
    display:flex;
    justify-content:center;
    gap:22px;
    margin-top:24px;
}

.socials a{
    width:52px;
    height:52px;

    border-radius:14px;

    background:rgba(255,255,255,.02);

    border:1px solid rgba(255,255,255,.05);

    display:flex;
    justify-content:center;
    align-items:center;

    text-decoration:none;

    color:white;
    font-size:22px;

    transition:.25s ease;
}

.socials a:hover{
    color:var(--blue-light);
    border-color:rgba(96,165,250,.25);
    transform:translateY(-4px);
}

.footer{
    margin-top:26px;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:2px;
    color:rgba(255,255,255,.25);
}

</style>
</head>

<script>

const USER_ID = "1168633780110635039";

async function updateDiscord(){

    try{

        const res = await fetch(
            `https://rpcapi.ftp.sh/v1/users/${USER_ID}`
        );

        const json = await res.json();

        if(!json.success) return;

        const user = json.data.discord_user;

        const avatar =
            `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${user.avatar.startsWith("a_") ? "gif" : "png"}`;

        document.getElementById("discordAvatar").src = avatar;
        document.getElementById("mainAvatar").src = avatar;

        document.getElementById("discordName").textContent =
            user.username;

        const status = json.data.discord_status;

        document.getElementById("discordStatus")
            .textContent =
            status.charAt(0).toUpperCase() +
            status.slice(1);

        const dot =
            document.getElementById("statusDot");

        if(status === "online"){
            dot.style.background = "#22c55e";
        }

        if(status === "idle"){
            dot.style.background = "#facc15";
        }

        if(status === "dnd"){
            dot.style.background = "#ef4444";
        }

        if(status === "offline"){
            dot.style.background = "#6b7280";
        }

        let activity = "No activity";

        if(json.data.activities &&
           json.data.activities.length){

            const a = json.data.activities.find(
                x => x.type !== 4
            );

            if(a){

                switch(a.type){

                    case 0:
                        activity = `Playing ${a.name}`;
                        break;

                    case 1:
                        activity = `Streaming ${a.name}`;
                        break;

                    case 2:
                        activity = `Listening to ${a.name}`;
                        break;

                    case 3:
                        activity = `Watching ${a.name}`;
                        break;

                    default:
                        activity = a.name;
                }

            }
        }

        document.getElementById("discordActivity")
            .textContent = activity;

    }catch(err){

        document.getElementById("discordStatus")
            .textContent = "RPC Offline";

    }

}

updateDiscord();

setInterval(updateDiscord,15000);

</script>
