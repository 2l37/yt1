<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>yt1</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=Radio+Canada+Big:wght@400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

:root{
    --bg:#070708;
    --card:rgba(255,255,255,.025);
    --border:rgba(255,255,255,.05);
    --blue:#1e40af;
    --blue-light:#60a5fa;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:white;
    font-family:'Figtree',sans-serif;
    overflow:hidden;
    min-height:100vh;
}

/* GLOW */

.glow{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
}

.glow::before{
    content:"";
    position:absolute;
    width:900px;
    height:900px;
    left:50%;
    top:-300px;
    transform:translateX(-50%);
    border-radius:999px;

    background:
    radial-gradient(circle,
    rgba(30,64,175,.55),
    transparent 70%);

    filter:blur(140px);
}

.glow::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    left:40%;
    top:20%;

    background:
    radial-gradient(circle,
    rgba(96,165,250,.15),
    transparent 70%);

    filter:blur(100px);
}

/* GRAIN */

.grain{
    position:fixed;
    inset:0;
    opacity:.03;
    pointer-events:none;

    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

main{
    width:100%;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.profile{
    width:100%;
    max-width:420px;

    display:flex;
    flex-direction:column;
    align-items:center;

    text-align:center;
}

/* AVATAR */

.avatar{
    width:110px;
    height:110px;
    border-radius:999px;
    object-fit:cover;

    border:1px solid var(--border);

    background:#111;

    margin-bottom:18px;
}

/* NAME */

.username{
    font-family:'Radio Canada Big',sans-serif;
    font-size:42px;
    font-weight:700;
    letter-spacing:-2px;
}

.bio{
    color:rgba(255,255,255,.45);
    margin-top:8px;
    font-size:14px;
}

.location{
    margin-top:10px;
    color:rgba(255,255,255,.4);
    font-size:12px;
    font-family:'JetBrains Mono',monospace;
}

/* DISCORD CARD */

.discord-card{
    width:100%;
    margin-top:24px;

    background:var(--card);

    border:1px solid var(--border);

    backdrop-filter:blur(24px);

    border-radius:20px;

    padding:16px;

    display:flex;
    align-items:center;
    gap:14px;
}

.discord-avatar{
    width:60px;
    height:60px;
    border-radius:16px;
    object-fit:cover;
}

.discord-info{
    text-align:left;
    flex:1;
}

.discord-name{
    font-weight:600;
    font-size:16px;
}

.discord-status{
    color:rgba(255,255,255,.55);
    font-size:13px;
    margin-top:2px;
}

.discord-activity{
    color:var(--blue-light);
    font-size:12px;
    margin-top:5px;
}

.status-dot{
    width:10px;
    height:10px;
    border-radius:999px;
    background:#22c55e;
}

/* SOCIALS */

.socials{
    margin-top:22px;

    display:flex;
    align-items:center;
    gap:22px;
}

.socials a{
    color:white;
    font-size:28px;

    transition:.25s;
}

.socials a:hover{
    color:var(--blue-light);
    transform:translateY(-3px);
}

.footer{
    margin-top:30px;

    font-family:'JetBrains Mono',monospace;
    font-size:11px;

    color:rgba(255,255,255,.3);

    letter-spacing:1px;
}

</style>
</head>

<body>

<div class="glow"></div>
<div class="grain"></div>

<main>

<div class="profile">

<img src="https://cdn.discordapp.com/avatars/1168633780110635039/2a864dc25930af001ef6622cd998506f.webp?size=1024" class="avatar">

<h1 class="username">yt1</h1>

<p class="bio">Run.</p>

<div class="location">
📍 Germany
</div>

<!-- DISCORD -->

<div class="discord-card">

<img
class="discord-avatar"
src="https://cdn.discordapp.com/avatars/1168633780110635039/2a864dc25930af001ef6622cd998506f.webp?size=1024">

<div class="discord-info">
<div class="discord-name">yt1</div>

<div class="discord-status">
Online
</div>

<div class="discord-activity">
Playing Roblox
</div>
</div>

<div class="status-dot"></div>

</div>

<!-- SOCIALS -->

<div class="socials">

<a href="#">
<i class="fab fa-discord"></i>
</a>

<a href="#">
<i class="fab fa-telegram"></i>
</a>

<a href="#">
<i class="fas fa-cart-shopping"></i>
</a>

<a href="#">
<i class="fas fa-cube"></i>
</a>

<a href="#">
<i class="fab fa-x-twitter"></i>
</a>

</div>

<div class="footer">
YT1.LOL
</div>

</div>

</main>

</body>
</html>
