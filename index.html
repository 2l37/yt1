<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yt1.lol // Cooking</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #222222;
            --glow: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Top Bar */
        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
        }

        .blink {
            width: 8px;
            height: 8px;
            background-color: #fff;
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px #fff;
        }

        /* Main Content */
        main {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        .logo-container {
            position: relative;
            margin-bottom: 24px;
        }

        h1 {
            font-size: clamp(3.5rem, 8vw, 7rem);
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 0.9;
            text-transform: lowercase;
            background: linear-gradient(180deg, #fff 0%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 2;
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--text-muted);
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 300;
            margin-top: 15px;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.5s forwards;
        }

        /* Progress Visualizer */
        .loading-bar {
            width: 180px;
            height: 2px;
            background: var(--accent);
            margin-top: 40px;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            left: -50%;
            height: 100%;
            width: 40%;
            background: #fff;
            animation: loading 1.8s infinite ease-in-out;
            box-shadow: 0 0 10px #fff;
        }

        /* Footer */
        footer {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: center;
            color: #333;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        /* Animations */
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        @keyframes loading {
            0% { left: -40%; }
            100% { left: 100%; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand" style="font-weight: 700;">yt1 // sys</div>
        <div class="status">
            <div class="blink"></div>
            <span>Under Construction</span>
        </div>
    </header>

    <main>
        <div class="logo-container">
            <h1>yt1.lol</h1>
        </div>
        <p class="subtitle">Something heavy is cooking</p>
        <div class="loading-bar"></div>
    </main>

    <footer>
        <p>&copy; 2026 yt1.lol. All rights reserved.</p>
    </footer>

</body>
</html>
