<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
    <title>yt1.lol // IDENTITY</title>
    <style>
        :root {
            --bg: #050505;
            --primary: #ffffff;
            --primary-glow: rgba(255, 255, 255, 0.15);
            --card-bg: rgba(255, 255, 255, 0.015);
            --card-border: rgba(255, 255, 255, 0.04);
            --card-hover-border: rgba(255, 255, 255, 0.12);
            --text-muted: #777777;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: scale(-1); /* Soft click style hint */
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* Luxury Deep Radial Background Glows */
        .ambient-glows {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
            filter: blur(120px);
            opacity: 0.4;
        }

        .glow-1 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-1/2, -1/2);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
        }

        /* Subtle Static Grain Texture Overlayer */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.015;
            z-index: 2;
            pointer-events: none;
        }

        /* Main Center Identity Card Wrapper */
        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            width: 100%;
            max-width: 540px;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            z-index: 3;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s;
        }

        .profile-card:hover {
            border-color: var(--card-hover-border);
        }

        /* Header Accent Badge */
        .badge-container {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .pulse-dot {
            width: 5px;
            height: 5px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff;
            animation: pulse 2s infinite alternate;
        }

        /* Typography styling matching luxury layouts */
        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -1px;
            color: #fff;
            margin-bottom: 8px;
        }

        .sub-heading {
            font-size: 1rem;
            color: #fff;
            opacity: 0.85;
            margin-bottom: 16px;
            font-weight: 400;
        }

        .bio {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 32px;
            max-width: 420px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Clean Functional Links list */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .link-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--card-border);
            padding: 16px 20px;
            border-radius: 10px;
            color: #eee;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .link-row:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: scale(1.015);
        }

        .link-row span:last-child {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: lowercase;
        }

        /* Interactive audio/disc element styling */
        .audio-control {
            margin-top: 32px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            color: var(--text-muted);
            background: transparent;
            border: none;
            outline: none;
            transition: color 0.2s;
        }
        
        .audio-control:hover {
            color: #fff;
        }

        .disc-icon {
            width: 14px;
            height: 14px;
            border: 2px solid currentColor;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 2s linear infinite;
            animation-play-state: paused;
        }

        .playing .disc-icon {
            animation-play-state: running;
        }

        /* Footer */
        footer {
            position: absolute;
            bottom: 24px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 1px;
            z-index: 2;
        }

        /* Animations */
        @keyframes pulse {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Ambient background glows -->
    <div class="ambient-glows">
        <div class="glow-1"></div>
    </div>

    <!-- Main Glass Profile Container Card -->
    <div class="profile-card">
        
        <!-- Premium Status Indicator Header -->
        <div class="badge-container">
            <div class="pulse-dot"></div>
            <span>vyre // active</span>
        </div>

        <!-- Identity Information -->
        <h1>yt1.lol</h1>
        <div class="sub-heading">digital space redefined.</div>
        <p class="bio">luxury privacy-based digital asset automation and modern user styling environments.</p>

        <!-- Clean Luxury Navigation Array Links -->
        <div class="links-container">
            <a href="https://vyre.store" target="_blank" class="link-row">
                <span>vyre_store</span>
                <span>marketplace</span>
            </a>
            
            <a href="https://discord.gg/yourinvite" target="_blank" class="link-row">
                <span>discord_hub</span>
                <span>community</span>
            </a>

            <a href="https://roblox.com" target="_blank" class="link-row">
                <span>projects</span>
                <span>development</span>
            </a>
        </div>

        <!-- Background Sound / Track Player Component Toggle -->
        <button class="audio-control" id="audioToggle">
            <div class="disc-icon"></div>
            <span id="audioStatus">audio asset paused</span>
        </button>
        <audio id="bgAudio" loop src="https://assets.mixkit.co/active_storage/sfx/123/123-200.wav"></audio>

    </div>

    <footer>
        <div>EST. 2026</div>
        <div>//</div>
        <div>DISCONNECT</div>
    </footer>

    <script>
        // Premium card dynamic mouse-tilt interactive physics effect
        const card = document.querySelector('.profile-card');
        
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // Simple Audio Playback controller script wrapper
        const audio = document.getElementById('bgAudio');
        const toggleBtn = document.getElementById('audioToggle');
        const statusText = document.getElementById('audioStatus');

        toggleBtn.addEventListener('click', () => {
            if (audio.paused) {
                // Change file src URL variable string to custom track paths
                audio.play().catch(() => {}); 
                toggleBtn.classList.add('playing');
                statusText.textContent = "audio asset playing";
            } else {
                audio.pause();
                toggleBtn.classList.remove('playing');
                statusText.textContent = "audio asset paused";
            }
        });
    </script>
</body>
</html>
