<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yt1 downloader</title>

<style>
:root {
    --primary: #FF0000;
    --primary-hover: #CC0000;
    --bg-color: #0f0f0f;
    --card-bg: #212121;
    --text-main: #ffffff;
    --text-muted: #aaaaaa;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
    height: 100vh;
    background-color: var(--bg-color);
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--text-main);
}

/* Modern Solid Card */
.card {
    background: var(--card-bg);
    padding: 40px;
    border-radius: 16px;
    width: 380px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: fadeIn 0.4s ease-out;
    border: 1px solid #333;
}

h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
}

.subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 24px;
}

/* Input field */
input {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #121212;
    color: var(--text-main);
    margin-bottom: 16px;
    font-size: 14px;
    transition: border-color 0.2s;
}

input:focus {
    outline: none;
    border-color: var(--primary);
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    background: var(--primary);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

button:hover {
    background: var(--primary-hover);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(255, 0, 0, 0.3);
}

/* Status Message */
#status {
    margin-top: 16px;
    font-size: 14px;
    font-weight: 500;
    min-height: 20px; /* Prevents layout shift */
}

/* Footer */
.footer {
    margin-top: 24px;
    font-size: 12px;
    color: #666;
    letter-spacing: 0.5px;
}

/* Loader */
.loader {
    margin: 16px auto 0;
    border: 3px solid #333;
    border-top: 3px solid var(--primary);
    border-radius: 50%;
    width: 24px;
    height: 24px;
    animation: spin 0.8s linear infinite;
    display: none;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="card">
    <h1>yt1 downloader</h1>
    <div class="subtitle">Download TikTok videos without watermark</div>

    <input id="url" placeholder="Paste link here..." autocomplete="off">
    <button onclick="downloadVideo()">Download Video</button>

    <div class="loader" id="loader"></div>
    <div id="status"></div>

    <div class="footer">made by yt1</div>
</div>

<script>
async function downloadVideo() {
    const url = document.getElementById("url").value;
    const status = document.getElementById("status");
    const loader = document.getElementById("loader");

    if (!url) {
        status.innerText = "Please enter a valid link.";
        status.style.color = "#ff4d4d";
        return;
    }

    status.style.color = "var(--text-main)";
    loader.style.display = "block";
    status.innerText = "Fetching video...";

    try {
        let res = await fetch(`https://tikwm.com/api/?url=${encodeURIComponent(url)}`);
        let data = await res.json();

        if (!data.data || !data.data.play) {
            status.innerText = "Failed to fetch video!";
            status.style.color = "#ff4d4d";
            loader.style.display = "none";
            return;
        }

        status.innerText = "Downloading...";

        let videoRes = await fetch(data.data.play);
        let blob = await videoRes.blob();

        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "yt1_video.mp4"; // Updated download filename
        document.body.appendChild(a);
        a.click();
        a.remove();

        loader.style.display = "none";
        status.innerText = "Download complete ✅";
        status.style.color = "#4CAF50"; // Green for success

    } catch (err) {
        loader.style.display = "none";
        status.innerText = "An error occurred!";
        status.style.color = "#ff4d4d";
    }
}
</script>

</body>
</html>
