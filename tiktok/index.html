<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>yt1.lol // tiktok downloader</title>
<meta name="description" content="Download TikTok videos without watermark.">

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=Radio+Canada+Big:wght@400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>

<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                background: '#070708',
                primary: '#1e40af',
                'primary-light': '#60a5fa',
            },
            fontFamily: {
                sans: ['Figtree', 'sans-serif'],
                heading: ['Radio Canada Big', 'sans-serif'],
                mono: ['JetBrains Mono', 'monospace'],
            }
        }
    }
}
</script>

<style>
html {
    scroll-behavior: smooth;
}

.grain-bg {
    background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.15) 1px, transparent 1px),
        radial-gradient(circle at 80% 80%, rgba(255,255,255,.1) 1px, transparent 1px);
    background-size: 24px 24px;
}

.animate-slide-up {
    animation: slideUp .7s ease forwards;
}

.animate-fade-in {
    animation: fadeIn .7s ease forwards;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

.loader {
    width: 26px;
    height: 26px;
    border: 2px solid rgba(255,255,255,.1);
    border-top: 2px solid #60a5fa;
    border-radius: 50%;
    animation: spin .8s linear infinite;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}
</style>
</head>

<body class="bg-background text-white antialiased overflow-hidden selection:bg-primary/40 font-sans">

<!-- BACK BUTTON -->
<div class="absolute top-6 left-6 z-50 animate-fade-in">
    <a href="/"
       class="flex items-center gap-2 text-xs font-mono text-white/40 hover:text-white/80 transition-colors bg-white/[0.02] border border-white/5 rounded-lg px-3 py-1.5 backdrop-blur-md">

        <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i>
        <span>/root</span>

    </a>
</div>

<!-- GLOW -->
<div class="absolute top-0 left-0 w-full h-screen -z-10 overflow-hidden pointer-events-none opacity-25 blur-[140px] contrast-[1.3]">

    <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[900px] h-[700px] bg-gradient-to-b from-primary to-transparent rounded-full"></div>

    <div class="absolute top-1/4 left-1/3 w-[500px] h-[500px] bg-gradient-to-tr from-primary-light/30 to-transparent rounded-full"></div>

</div>

<!-- MAIN -->
<main class="w-full min-h-screen flex items-center justify-center px-4 relative">

    <div class="absolute inset-0 pointer-events-none opacity-[0.02] grain-bg"></div>

    <section class="w-full max-w-md relative z-10 animate-slide-up">

        <div class="bg-white/[0.02] border border-white/5 rounded-2xl backdrop-blur-xl p-8">

            <!-- HEADER -->
            <div class="text-center">

                <div class="text-[10px] tracking-widest uppercase font-mono text-white/30 mb-3">
                    yt1.lol / <span class="text-primary-light">tiktok</span>
                </div>

                <h1 class="text-4xl font-heading font-bold tracking-tight">
                    TikTok Downloader
                </h1>

                <p class="text-white/50 text-sm mt-3">
                    Download TikTok videos without watermark.
                </p>

            </div>

            <!-- INPUT -->
            <div class="mt-8 space-y-4">

                <input
                    id="url"
                    type="text"
                    placeholder="Paste TikTok URL..."
                    autocomplete="off"
                    class="w-full bg-white/[0.03] border border-white/5 rounded-xl px-4 py-3 text-sm outline-none transition-all focus:border-primary focus:bg-white/[0.04]"
                >

                <button
                    onclick="downloadVideo()"
                    class="group w-full flex items-center justify-center gap-2 bg-primary hover:bg-blue-700 rounded-xl py-3 transition-all duration-300 font-medium">

                    <i data-lucide="download" class="w-4 h-4"></i>
                    Download Video

                </button>

            </div>

            <!-- LOADER -->
            <div id="loader" class="hidden justify-center mt-6">
                <div class="loader"></div>
            </div>

            <!-- STATUS -->
            <div
                id="status"
                class="mt-5 text-center text-sm text-white/50 min-h-[20px]">
            </div>

        </div>

        <!-- FOOTER -->
        <div class="mt-6 text-center font-mono text-[10px] tracking-wider text-white/20">
            © 2026 YT1.LOL // ALL RIGHTS RESERVED
        </div>

    </section>

</main>

<script>
lucide.createIcons();

async function downloadVideo() {

    const url = document.getElementById("url").value.trim();
    const status = document.getElementById("status");
    const loader = document.getElementById("loader");

    if (!url) {
        status.innerText = "Please enter a TikTok URL.";
        status.style.color = "#ef4444";
        return;
    }

    loader.classList.remove("hidden");
    loader.classList.add("flex");

    status.style.color = "#9ca3af";
    status.innerText = "Fetching video...";

    try {

        const res = await fetch(
            `https://tikwm.com/api/?url=${encodeURIComponent(url)}`
        );

        const data = await res.json();

        if (!data.data || !data.data.play) {

            loader.classList.add("hidden");

            status.innerText = "Failed to fetch video.";
            status.style.color = "#ef4444";

            return;
        }

        status.innerText = "Downloading...";

        const videoRes = await fetch(data.data.play);
        const blob = await videoRes.blob();

        const a = document.createElement("a");

        a.href = URL.createObjectURL(blob);
        a.download = "yt1_video.mp4";

        document.body.appendChild(a);

        a.click();

        a.remove();

        loader.classList.add("hidden");

        status.innerText = "Download complete ✓";
        status.style.color = "#22c55e";

    } catch (err) {

        loader.classList.add("hidden");

        status.innerText = "An error occurred.";
        status.style.color = "#ef4444";
    }
}
</script>

</body>
</html>
